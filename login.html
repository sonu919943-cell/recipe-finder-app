<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login / Signup | Recipe Finder</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-split-ui">
  <div class="split-left">
    <div class="chef-art">
      <!-- Vector chef/food SVG illustration (loads instantly, no image needed!) -->
      <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="110" cy="180" rx="82" ry="26" fill="#ffe789"/>
        <rect x="80" y="110" width="60" height="50" rx="13" fill="#fff7ea" stroke="#fa8624" stroke-width="3"/>
        <ellipse cx="110" cy="80" rx="50" ry="30" fill="#fff"/>
        <ellipse cx="110" cy="73" rx="37" ry="21" fill="#ffe789"/>
        <circle cx="118" cy="80" r="9.5" fill="#ff7a50"/>
        <ellipse cx="110" cy="145" rx="24" ry="7" fill="#ffc677"/>
        <rect x="87" y="150" width="45" height="12" rx="4" fill="#fa8624"/>
        <ellipse cx="110" cy="80" rx="29" ry="4.5" fill="#fae1be"/>
        <ellipse cx="110" cy="87" rx="18" ry="3" fill="#ffe789"/>
      </svg>
    </div>
  </div>
  <div class="split-right">
    <form id="loginForm" class="auth-form">
      <span class="logo-svg"></span>
      <h2 id="authTitle">Welcome Back</h2>
      <p class="form-sub">Sign in to continue</p>
      <div class="input-group">
        <span class="input-icon">📧</span>
        <input type="text" id="username" required placeholder="user id" />
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" required placeholder="Password" />
      </div>
      <button type="submit" id="submitBtn">Login</button>
      <div id="loginMsg"></div>
      <div class="auth-toggle">
        <span id="toggleText">New here?</span>
        <a href="#" id="toggleAuth">Sign up</a>
      </div>
      <a href="#" class="form-link">Forgot Password</a>
    </form>
  </div>
  <script>
    
    document.querySelectorAll(".logo-svg").forEach(span=>{
      span.innerHTML = `<svg width="34" height="34" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="vertical-align:middle;"><ellipse cx="24" cy="33" rx="18" ry="8" fill="#ffe789"/><ellipse cx="24" cy="25" rx="14" ry="7" fill="#fffbe4"/><ellipse cx="24" cy="13" rx="11" ry="7" fill="#ffe789"/><ellipse cx="24" cy="17" rx="13" ry="8" fill="#fff"/><circle cx="24" cy="17" r="4" fill="#ff7a50"/><ellipse cx="24" cy="38" rx="10" ry="3" fill="#ffc677"/><path d="M13 31 Q24 43 35 31" fill="none" stroke="#fa8624" stroke-width="2"/></svg>`;
    });
    let signup = false;
    document.getElementById("toggleAuth").onclick = function(e){
      e.preventDefault();
      signup = !signup;
      document.getElementById("authTitle").innerText = signup ? "Sign Up" : "Welcome Back";
      document.querySelector(".form-sub").innerText = signup ? "Create your account" : "Sign in to continue";
      document.getElementById("submitBtn").innerText = signup ? "Sign Up" : "Login";
      document.getElementById("toggleText").textContent = signup ?"Already registered?" : "New here?";
      document.getElementById("toggleAuth").textContent = signup ? "Sign in" : "Sign up";
    };
    document.getElementById("loginForm").onsubmit = function(e){
      e.preventDefault();
      localStorage.setItem("username", document.getElementById("username").value);
      window.location.href = "index.html";
    };
  </script>
</body>
</html>
